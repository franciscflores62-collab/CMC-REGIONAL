<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Centro de Gestión de Crisis — control regional de carnet, incidentes, vehículos y cámaras.">
<title>CMC · Crisis Management Center</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='46' fill='%23070b14' stroke='%2322d3ee' stroke-width='6'/%3E%3Ctext x='50' y='63' font-size='42' text-anchor='middle' fill='%2322d3ee' font-family='Arial' font-weight='bold'%3ECMC%3C/text%3E%3C/svg%3E">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg-0:#070b14;
    --bg-1:#0c1220;
    --panel:#0e1729;
    --border:rgba(34,211,238,.18);
    --border-strong:rgba(34,211,238,.4);
    --cyan:#22d3ee;
    --cyan-soft:#7dd3fc;
    --amber:#fbbf24;
    --red:#f87171;
    --text:#e6f1ff;
    --muted:#7c92ad;
  }

  *{scrollbar-color: var(--cyan) var(--bg-1);}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Inter', system-ui, sans-serif;
    background:
      radial-gradient(ellipse 90% 60% at 50% -10%, rgba(34,211,238,.10), transparent 60%),
      radial-gradient(ellipse 70% 50% at 100% 100%, rgba(56,189,248,.06), transparent 60%),
      var(--bg-0);
    color:var(--text);
    min-height:100vh;
  }
  .font-display{ font-family:'Orbitron', sans-serif; }

  /* ---------- Header ---------- */
  .header-blur{
    background:rgba(6,10,18,.75);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
  }
  .brand-mark{
    width:52px;height:52px;border-radius:14px;
    background:linear-gradient(145deg,#0f2436,#0a1420);
    border:1px solid var(--border-strong);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 22px rgba(34,211,238,.25), inset 0 0 12px rgba(34,211,238,.08);
    flex-shrink:0;
    overflow:hidden;
  }
  .brand-mark img{ width:100%; height:100%; object-fit:contain; }
  .status-dot{
    width:8px;height:8px;border-radius:50%;
    background:#34d399;
    box-shadow:0 0 8px #34d399;
    animation:pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot{ 0%,100%{opacity:1;} 50%{opacity:.35;} }

  /* ---------- Cards ---------- */
  .panel{
    background:linear-gradient(180deg, rgba(20,32,50,.75), rgba(10,16,28,.75));
    border:1px solid var(--border);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
  }
  .main-card{
    transition:transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s ease, border-color .25s ease;
    position:relative;
    overflow:hidden;
  }
  .main-card::before{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(135deg, rgba(34,211,238,.08), transparent 55%);
    opacity:0; transition:opacity .25s ease;
  }
  .main-card:hover{
    transform:translateY(-6px);
    border-color:var(--border-strong);
    box-shadow:0 18px 40px -12px rgba(34,211,238,.35);
  }
  .main-card:hover::before{ opacity:1; }
  .main-card:focus-visible, .submenu-card:focus-visible, button:focus-visible, a:focus-visible{
    outline:2px solid var(--cyan);
    outline-offset:3px;
  }
  .card-icon{
    width:64px;height:64px;border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;
    box-shadow:0 8px 20px -6px rgba(0,0,0,.5);
  }

  .submenu-card{
    transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
  }
  .submenu-card:hover{
    transform:translateX(4px);
    border-color:var(--border-strong);
    box-shadow:0 10px 26px -10px rgba(34,211,238,.35);
  }
  .flag-img{
    width:72px;height:48px;object-fit:cover;border-radius:8px;
    box-shadow:0 4px 14px rgba(0,0,0,.55);
    border:1px solid rgba(255,255,255,.08);
    transition:transform .25s ease;
    flex-shrink:0;
  }
  .submenu-card:hover .flag-img{ transform:scale(1.06); }

  /* ---------- Clocks ---------- */
  .clock{ font-family:'Orbitron', monospace; letter-spacing:2px; }
  .airport-clock{
    font-family:'Orbitron', monospace;
    font-size:clamp(24px,4vw,34px);
    font-weight:700;
    letter-spacing:3px;
    color:var(--cyan);
    background:#04070c;
    border:1px solid rgba(34,211,238,.45);
    border-radius:12px;
    padding:14px 10px;
    box-shadow:0 0 18px rgba(34,211,238,.25), inset 0 0 12px rgba(0,0,0,.6);
    text-shadow:0 0 10px rgba(34,211,238,.7);
    text-align:center;
  }

  /* ---------- View transitions ---------- */
  .view{ animation:fadeSlideIn .35s cubic-bezier(.2,.8,.2,1); }
  @keyframes fadeSlideIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .section-title{
    display:flex; align-items:center; gap:14px; justify-content:center;
  }
  .section-title::before, .section-title::after{
    content:''; height:1px; width:64px;
    background:linear-gradient(90deg, transparent, var(--border-strong));
  }
  .section-title::after{ background:linear-gradient(90deg, var(--border-strong), transparent); }

  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background:var(--bg-1); }
  ::-webkit-scrollbar-thumb{ background:rgba(34,211,238,.35); border-radius:8px; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; transition-duration:.001ms !important; }
  }
</style>
</head>
<body class="text-white" style="background-image: linear-gradient(rgba(7,11,20,.55), rgba(7,11,20,.72)), url('./assets/background.jpg'); background-size: cover; background-position: center; background-attachment: fixed;">

  <!-- Header -->
  <header class="header-blur sticky top-0 z-50 border-b border-cyan-500/20">
    <div class="max-w-7xl mx-auto px-5 md:px-8 py-3.5 flex items-center justify-between gap-4">
      <div class="flex items-center gap-4">
        <div class="brand-mark">
          <img src="./assets/logo.png"
               alt="Logo"
               onerror="this.parentElement.innerHTML='<i class=\'fas fa-shield-halved text-cyan-300 text-2xl\'></i>'">
        </div>
        <div>
          <h1 class="font-display text-2xl md:text-3xl font-bold tracking-[3px] text-cyan-300" style="text-shadow:0 0 16px rgba(34,211,238,.55)">CMC</h1>
          <p class="text-[10px] md:text-xs tracking-[3px] text-cyan-400/80 -mt-0.5">CRISIS MANAGEMENT CENTER</p>
        </div>
      </div>

      <div class="flex items-center gap-4 md:gap-6">
        <div class="hidden sm:flex items-center gap-2 text-xs text-emerald-300/90">
          <span class="status-dot"></span>
          <span class="tracking-wide">SISTEMA OPERATIVO</span>
        </div>
        <div class="text-right">
          <div id="digital-clock" class="clock text-xl md:text-2xl font-semibold text-cyan-300"></div>
          <div id="digital-date" class="text-[10px] md:text-xs text-cyan-500/70 tracking-wide -mt-0.5"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-5 md:px-8 pt-10 pb-24">

    <!-- Main Menu -->
    <div id="main-menu" class="view">
      <div class="mb-8">
        <p class="text-cyan-400/70 text-xs tracking-[3px] font-display">PANEL PRINCIPAL</p>
        <h2 class="text-2xl md:text-3xl font-semibold mt-1">Selecciona un módulo</h2>
      </div>

      <div id="module-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-5"></div>

      <!-- Regional Time -->
      <div class="mt-16">
        <h2 class="section-title font-display text-xl md:text-2xl font-bold text-cyan-300 mb-6">HORA REGIONAL</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-5">
          <div class="panel rounded-2xl p-4 text-center">
            <h3 class="text-sm text-cyan-100/80 mb-3 tracking-wide">Honduras</h3>
            <div id="clock-hn" class="airport-clock">--:--:--</div>
          </div>
          <div class="panel rounded-2xl p-4 text-center">
            <h3 class="text-sm text-cyan-100/80 mb-3 tracking-wide">Nicaragua</h3>
            <div id="clock-ni" class="airport-clock">--:--:--</div>
          </div>
          <div class="panel rounded-2xl p-4 text-center">
            <h3 class="text-sm text-cyan-100/80 mb-3 tracking-wide">El Salvador</h3>
            <div id="clock-sv" class="airport-clock">--:--:--</div>
          </div>
          <div class="panel rounded-2xl p-4 text-center">
            <h3 class="text-sm text-cyan-100/80 mb-3 tracking-wide">Rep. Dominicana</h3>
            <div id="clock-do" class="airport-clock">--:--:--</div>
          </div>
        </div>
      </div>

    <!-- Submenu -->
    <div id="submenu" class="hidden view">
      <button onclick="goBack()"
              class="flex items-center gap-2 text-cyan-400 hover:text-cyan-200 transition-colors mb-6 text-sm md:text-base font-medium">
        <i class="fas fa-arrow-left"></i> REGRESAR AL PANEL
      </button>

      <h2 id="submenu-title" class="font-display text-2xl md:text-3xl font-bold mb-8 text-cyan-300"></h2>

      <div id="submenu-items" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
    </div>
  </main>

  <footer class="border-t border-cyan-500/15 py-5 text-center text-xs text-cyan-400/50 tracking-wide">
    CMC · SISTEMA DE GESTIÓN INTEGRADA REGIONAL
  </footer>

<script>
  // ---------- Reloj principal ----------
  function updateClock() {
    const now = new Date();
    document.getElementById('digital-clock').textContent =
      now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    document.getElementById('digital-date').textContent =
      now.toLocaleDateString('es-ES', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' }).toUpperCase();
  }

  // ---------- Relojes regionales ----------
  const REGIONAL_CLOCKS = [
    { id: 'clock-hn', tz: 'America/Tegucigalpa' },
    { id: 'clock-ni', tz: 'America/Managua' },
    { id: 'clock-sv', tz: 'America/El_Salvador' },
    { id: 'clock-do', tz: 'America/Santo_Domingo' }
  ];

  function updateRegionalClocks() {
    REGIONAL_CLOCKS.forEach(clock => {
      const el = document.getElementById(clock.id);
      if (!el) return;
      el.textContent = new Date().toLocaleTimeString('es-ES', {
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        timeZone: clock.tz, hour12: false
      });
    });
  }

  setInterval(updateClock, 1000);
  setInterval(updateRegionalClocks, 1000);
  updateClock();
  updateRegionalClocks();

  // ---------- Datos de módulos ----------
  const MODULES = [
    {
      id: 1,
      title: "CONTROL DE CARNET",
      subtitle: "Registro y control de acceso",
      icon: "fa-id-card",
      color: "bg-blue-600",
      items: [
        { name: "FORMULARIO CONTROL DE CARNET", link: "https://app.smartsheet.com/b/form/8ef9cf1b2f814ad586f8050d7d440d91" }
      ]
    },
    {
      id: 2,
      title: "REPORTES DE INCIDENTES",
      subtitle: "Registro de eventos por país",
      icon: "fa-triangle-exclamation",
      color: "bg-red-600",
      accent: "border-red-500/30",
      titleAccent: "text-red-300",
      items: [
        { name: "INCIDENTES HONDURAS", code: "hn", link: "https://app.smartsheet.com/b/form/019cb5514d7275dc801fba7f96ea5f34" },
        { name: "INCIDENTES NICARAGUA", code: "ni", link: "https://app.smartsheet.com/b/form/41567b8b59e347aabeb0ee8eb515bcb3" },
        { name: "INCIDENTES REPÚBLICA DOMINICANA", code: "do", link: "https://app.smartsheet.com/b/form/019cb4df578d74ff90d716b110e85e4d" },
        { name: "INCIDENTES EL SALVADOR", code: "sv", link: "#", disabled: true, note: "SITIO EN CONSTRUCCIÓN" }
      ]
    },
    {
      id: 3,
      title: "ENTREGA RECIBO VEHÍCULOS",
      subtitle: "Control de entrega de unidades",
      icon: "fa-car",
      color: "bg-sky-600",
      items: [
        { name: "ENTREGA VEHÍCULOS HN", code: "hn", link: "https://app.smartsheet.com/b/form/bc142c15f6b24dffa4bb4ac77b804b2b" },
        { name: "ENTREGA VEHÍCULOS DR", code: "do", link: "https://app.smartsheet.com/b/form/019d49e33508733391a9107adc7d641d" }
      ]
    },
    {
      id: 4,
      title: "REVISIÓN CÁMARAS GLOBAL",
      subtitle: "Monitoreo de video en vivo",
      icon: "fa-video",
      color: "bg-violet-600",
      items: [
        { name: "CÁMARAS HONDURAS", code: "hn", link: "https://app.smartsheet.com/sheets/M6Pr2fg44xFJcXRC4g2X7WF442V8J3mg5VVjGHF1" },
        { name: "CÁMARAS NICARAGUA", code: "ni", link: "https://app.smartsheet.com/sheets/CpfP6G4qgjFw26pMh6V28Hj9cXqvp8cP7hMW9m51" },
        { name: "CÁMARAS EL SALVADOR", code: "sv", link: "#", disabled: true, note: "SITIO EN CONSTRUCCIÓN" },
        { name: "CÁMARAS REPÚBLICA DOMINICANA", code: "do", link: "https://app.smartsheet.com/sheets/cPQvVFR8X8GMhmXwm52J7gXJ8pvr2Cvm72662fv1" }
      ]
    },
    {
      id: 5,
      title: "HISTORIAL VIDEOS",
      subtitle: "Archivo de grabaciones",
      icon: "fa-clock-rotate-left",
      color: "bg-purple-600",
      items: [
        { name: "HISTORIAL HONDURAS", code: "hn", link: "https://app.smartsheet.com/b/form/0f80986e6b5247139b180d0c6a145fbc" },
        { name: "HISTORIAL NICARAGUA", code: "ni", link: "https://app.smartsheet.com/b/form/840292ee9a804a3a9254ecccec1caa7d" }
      ]
    },
    {
      id: 6,
      title: "MAPA DE PLANTAS",
      subtitle: "Ubicación de plantas por país",
      icon: "fa-industry",
      color: "bg-emerald-600",
      type: "plants",
      // mismo mapa base (mid) recentrado por país mediante ll (lat,lng) y z (zoom).
      // Si cada país tiene su propio Google My Maps, reemplaza 'mid' por el ID de ese mapa.
      mapMid: "1tKV6SxHfEcDN2ejE5TabG7OYs11aql0",
      items: [
        { name: "Honduras", code: "hn", ll: "14.0723,-87.1921", z: 8, plants: [] },
        { name: "Nicaragua", code: "ni", ll: "12.114993,-86.236174", z: 8, plants: [] },
        { name: "El Salvador", code: "sv", ll: "13.6929,-89.2182", z: 9, plants: [] },
        { name: "República Dominicana", code: "do", ll: "18.4861,-69.9312", z: 8, plants: [] }
      ]
    }
  ];

  // ---------- Render menú principal ----------
  function renderMainMenu() {
    const grid = document.getElementById('module-grid');
    grid.innerHTML = MODULES.map(m => `
      <div role="button" tabindex="0" aria-label="${m.title}"
           onclick="openModule(${m.id})"
           onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openModule(${m.id})}"
           class="panel main-card rounded-3xl p-6 text-center cursor-pointer ${m.accent || ''}">
        <div class="flex justify-center mb-4">
          <div class="card-icon ${m.color}">
            <i class="fas ${m.icon}"></i>
          </div>
        </div>
        <h3 class="font-semibold text-base md:text-lg ${m.titleAccent || ''}">${m.title}</h3>
        <p class="text-xs text-cyan-100/50 mt-1">${m.subtitle}</p>
      </div>
    `).join('');
  }

  // ---------- Abrir módulo ----------
  function openModule(id) {
    const mod = MODULES.find(m => m.id === id);
    if (!mod) return;

    document.getElementById('main-menu').classList.add('hidden');
    const submenu = document.getElementById('submenu');
    submenu.classList.remove('hidden');
    submenu.classList.remove('view'); void submenu.offsetWidth; submenu.classList.add('view');

    document.getElementById('submenu-title').textContent = mod.title;
    const container = document.getElementById('submenu-items');

    if (mod.type === 'plants') {
      renderPlantsModule(mod, container);
    } else {
      renderGenericModule(mod, container);
    }

    submenu.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ---------- Render: módulos de enlaces (Smartsheet, etc.) ----------
  function renderGenericModule(mod, container) {
    container.className = "grid grid-cols-1 md:grid-cols-2 gap-5";
    container.innerHTML = mod.items.map(item => `
      <div class="panel rounded-3xl p-5 md:p-6 flex items-center gap-5 md:gap-8 submenu-card ${item.disabled ? 'opacity-55 cursor-not-allowed' : 'cursor-pointer'}"
           ${!item.disabled ? `role="button" tabindex="0" onclick="window.open('${item.link}','_blank','noopener')" onkeydown="if(event.key==='Enter'){window.open('${item.link}','_blank','noopener')}"` : 'aria-disabled="true"'}>
        ${item.code ? `
          <img src="https://flagcdn.com/w320/${item.code}.png"
               alt="Bandera ${item.name}"
               class="flag-img"
               onerror="this.style.display='none'">
        ` : `
          <div class="w-16 h-16 rounded-xl ${mod.color} flex items-center justify-center flex-shrink-0">
            <i class="fas ${mod.icon} text-xl"></i>
          </div>
        `}
        <div class="flex-1 min-w-0">
          <p class="text-base md:text-xl font-medium truncate">${item.name}</p>
          ${item.note ? `<p class="text-amber-400 text-xs md:text-sm mt-1 flex items-center gap-1.5"><i class="fas fa-hammer text-[10px]"></i>${item.note}</p>` : ''}
        </div>
        ${!item.disabled ? `<i class="fas fa-arrow-right text-2xl md:text-3xl text-cyan-400 flex-shrink-0"></i>` : ''}
      </div>
    `).join('');
  }

  // ---------- Render: mapa de plantas por país (acordeón) ----------
  function renderPlantsModule(mod, container) {
    container.className = "grid grid-cols-1 gap-5";
    container.innerHTML = mod.items.map((country, idx) => `
      <div class="panel rounded-3xl overflow-hidden">
        <div class="p-5 md:p-6 flex items-center gap-5 md:gap-8 submenu-card cursor-pointer"
             role="button" tabindex="0" aria-expanded="false" id="plant-toggle-${idx}"
             onclick="togglePlantCountry(${idx})"
             onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();togglePlantCountry(${idx})}">
          <img src="https://flagcdn.com/w320/${country.code}.png"
               alt="Bandera ${country.name}"
               class="flag-img"
               onerror="this.style.display='none'">
          <div class="flex-1 min-w-0">
            <p class="text-base md:text-xl font-medium truncate">${country.name}</p>
            <p class="text-xs md:text-sm text-cyan-100/50 mt-1">
              ${country.plants.length ? `${country.plants.length} planta(s) registrada(s)` : 'Ver mapa y detalle de plantas'}
            </p>
          </div>
          <i class="fas fa-chevron-down text-xl text-cyan-400 flex-shrink-0 transition-transform" id="plant-chevron-${idx}"></i>
        </div>

        <div class="hidden px-5 md:px-6 pb-6" id="plant-panel-${idx}">
          <div class="rounded-2xl overflow-hidden border border-cyan-500/20 mb-4">
            <iframe
              src="https://www.google.com/maps/d/embed?mid=${mod.mapMid}&ll=${country.ll}&z=${country.z}&ehbc=2E312F&noprof=1"
              class="w-full h-[320px] md:h-[420px]"
              style="border:0;"
              loading="lazy"
              title="Mapa de plantas — ${country.name}"
              allowfullscreen>
            </iframe>
          </div>

          ${country.plants.length ? `
            <ul class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              ${country.plants.map(p => `
                <li class="bg-black/30 border border-cyan-500/15 rounded-xl px-4 py-3 text-sm">
                  <p class="font-medium">${p.name}</p>
                  ${p.address ? `<p class="text-cyan-100/50 text-xs mt-0.5">${p.address}</p>` : ''}
                </li>
              `).join('')}
            </ul>
          ` : `
            <p class="text-xs text-cyan-100/40 italic">
              Sin plantas configuradas todavía. Agrega objetos <code>{ name, address }</code> al arreglo
              <code>plants</code> de "${country.name}" en el script para listarlas aquí.
            </p>
          `}
        </div>
      </div>
    `).join('');
  }

  function togglePlantCountry(idx) {
    const panel = document.getElementById(`plant-panel-${idx}`);
    const chevron = document.getElementById(`plant-chevron-${idx}`);
    const toggle = document.getElementById(`plant-toggle-${idx}`);
    const isOpen = !panel.classList.contains('hidden');
    panel.classList.toggle('hidden');
    chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
    toggle.setAttribute('aria-expanded', String(!isOpen));
  }

  function goBack() {
    document.getElementById('submenu').classList.add('hidden');
    const mainMenu = document.getElementById('main-menu');
    mainMenu.classList.remove('hidden');
    mainMenu.classList.remove('view'); void mainMenu.offsetWidth; mainMenu.classList.add('view');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  renderMainMenu();
</script>
</body>
</html>
